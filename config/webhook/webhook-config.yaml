apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: policywall-webhook
webhooks:
- name: validate.policy.casbin.org
  admissionReviewVersions:
  - v1
  - v1beta1
  clientConfig:
    service:
      name: policywall-webhook
      namespace: policywall-system
      path: /validate
    caBundle: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCi0tLS0tRU5EIENFUlRJRklDQVRFLS0tLS0=
  failurePolicy: Fail
  sideEffects: None
  rules:
  - apiGroups:
    - "*"
    apiVersions:
    - "*"
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - "*"
  namespaceSelector:
    matchExpressions:
    - key: policy.casbin.org/ignore
      operator: DoesNotExist
