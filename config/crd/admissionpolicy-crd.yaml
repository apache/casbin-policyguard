apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: admissionpolicies.policy.casbin.org
spec:
  group: policy.casbin.org
  names:
    kind: AdmissionPolicy
    listKind: AdmissionPolicyList
    plural: admissionpolicies
    singular: admissionpolicy
    shortNames:
    - ap
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - model
            - policy
            properties:
              dryRun:
                type: boolean
                description: Enables audit mode where violations are logged but requests are allowed
              model:
                type: string
                description: Casbin model configuration
              policy:
                type: string
                description: Casbin policy configuration
              matchRules:
                type: array
                description: Defines which admission requests this policy applies to
                items:
                  type: object
                  properties:
                    apiGroups:
                      type: array
                      items:
                        type: string
                    apiVersions:
                      type: array
                      items:
                        type: string
                    resources:
                      type: array
                      items:
                        type: string
                    operations:
                      type: array
                      items:
                        type: string
          status:
            type: object
            properties:
              ready:
                type: boolean
                description: Indicates whether the policy is loaded and ready
              message:
                type: string
                description: Provides additional information about the status
              lastUpdated:
                type: string
                format: date-time
                description: Timestamp when the policy was last updated
              violationCount:
                type: integer
                format: int64
                description: Number of violations detected in dry-run mode
              recentViolations:
                type: array
                description: Most recent violations (limited to last 10)
                items:
                  type: object
                  properties:
                    kind:
                      type: string
                      description: Resource kind (e.g., Pod, Deployment)
                    namespace:
                      type: string
                      description: Resource namespace
                    name:
                      type: string
                      description: Resource name
                    operation:
                      type: string
                      description: Operation attempted (CREATE, UPDATE, DELETE)
                    timestamp:
                      type: string
                      format: date-time
                      description: When the violation occurred
                    user:
                      type: string
                      description: User who attempted the operation
                    message:
                      type: string
                      description: Violation reason
    additionalPrinterColumns:
    - name: DryRun
      type: boolean
      jsonPath: .spec.dryRun
    - name: Ready
      type: boolean
      jsonPath: .status.ready
    - name: Violations
      type: integer
      jsonPath: .status.violationCount
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    subresources:
      status: {}
