apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: admissionpolicies.policywall.casbin.org
spec:
  group: policywall.casbin.org
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - template
                - rules
              properties:
                template:
                  type: string
                  description: Template specifies the type of policy template to use
                model:
                  type: string
                  description: Model defines the Casbin RBAC model
                rules:
                  type: array
                  items:
                    type: string
                  description: Rules contains the policy rules
                failurePolicy:
                  type: string
                  description: FailurePolicy defines how to handle policy evaluation failures
                namespaceSelector:
                  type: object
                  description: NamespaceSelector determines which namespaces this policy applies to
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                    matchExpressions:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          values:
                            type: array
                            items:
                              type: string
                dryRun:
                  type: boolean
                  description: DryRun when true, policy violations are logged but not enforced
                parameters:
                  type: object
                  additionalProperties:
                    type: string
                  description: Parameters contains template-specific parameters
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                lastUpdated:
                  type: string
                  format: date-time
                violationCount:
                  type: integer
                  format: int64
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Template
          type: string
          jsonPath: .spec.template
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Violations
          type: integer
          jsonPath: .status.violationCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: admissionpolicies
    singular: admissionpolicy
    kind: AdmissionPolicy
    shortNames:
      - ap
