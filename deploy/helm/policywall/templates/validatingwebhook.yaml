apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "policywall.fullname" . }}
  labels:
    {{- include "policywall.labels" . | nindent 4 }}
webhooks:
  - name: validate.policywall.casbin.org
    clientConfig:
      service:
        name: {{ include "policywall.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: "/validate"
      caBundle: {{ .Values.webhook.caBundle | default "" }}
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["*"]
        apiVersions: ["*"]
        resources: ["*"]
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    sideEffects: None
    admissionReviewVersions: ["v1"]
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
    {{- with .Values.webhook.namespaceSelector }}
    namespaceSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
